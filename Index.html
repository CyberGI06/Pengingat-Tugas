<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengingat Tugas Pelajaran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('background.jpeg.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98); 
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            opacity: 90%;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
            opacity: 80%;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-wrap: wrap;
            gap: 20px;
            opacity: 80%;
        }

        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            display: block;
        }

        .add-task {
            padding: 30px;
            background: #f8f9ff;
            border-bottom: 1px solid #eee;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 200px auto;
            gap: 15px;
            align-items: end;
            margin-bottom: 20px;
        }

        .input-group input, .input-group select {
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .file-upload {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border: 2px dashed #4facfe;
            border-radius: 12px;
            background: #f0f8ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload:hover {
            background: #e6f3ff;
            border-color: #00d4ff;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-info {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .subject-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border-top: 4px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .subject-card.submitted {
            border-top-color: #00b894;
            background: linear-gradient(135deg, #e8f5e8 0%, #f0fff0 100%);
        }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .subject-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .subject-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .subject-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #333;
            flex: 1;
        }

        .task-count {
            background: #4facfe;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-submitted { background: #d4edda; color: #155724; }

        .task-item {
            background: #f8f9ff;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #4facfe;
            transition: all 0.3s ease;
            position: relative;
        }

        .task-item.submitted {
            background: #e8f5e8;
            border-left-color: #00b894;
            opacity: 0.8;
        }

        .task-item:hover {
            background: #e8f4fd;
            transform: translateX(5px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .task-text {
            font-size: 15px;
            color: #444;
            font-weight: 500;
        }

        .task-date {
            font-size: 13px;
            color: #666;
        }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            padding: 8px;
            background: rgba(79, 172, 254, 0.1);
            border-radius: 6px;
            font-size: 13px;
        }

        .file-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #4facfe;
            color: white;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
            }
            
            .subjects-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Warna mata pelajaran */
        .matematika { border-top-color: #FF6B6B; }
        .matematika .subject-icon { background: #FF6B6B; }
        .biologi { border-top-color: #4ECDC4; }
        .biologi .subject-icon { background: #4ECDC4; }
        .kimia { border-top-color: #45B7D1; }
        .kimia .subject-icon { background: #45B7D1; }
        .ekonomi { border-top-color: #F9CA24; }
        .ekonomi .subject-icon { background: #F9CA24; color: #333; }
        .sosiologi { border-top-color: #BB8FCE; }
        .sosiologi .subject-icon { background: #BB8FCE; }
        .geografi { border-top-color: #96CEB4; }
        .geografi .subject-icon { background: #96CEB4; }
        .bahasa-indonesia { border-top-color: #FF9FF3; }
        .bahasa-indonesia .subject-icon { background: #FF9FF3; }
        .bahasa-inggris { border-top-color: #54A0FF; }
        .bahasa-inggris .subject-icon { background: #54A0FF; }
        .fisika { border-top-color: #5F27CD; }
        .fisika .subject-icon { background: #5F27CD; }
        .informatika { border-top-color: #00D2D3; }
        .informatika .subject-icon { background: #00D2D3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Pengingat Tugas </h1>
            <p>Kelola & Submit tugas pelajaranmu dengan mudah!</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">Total Tugas</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="todayTasks">0</span>
                <span class="stat-label">Tugas Hari Ini</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="submittedTasks">0</span>
                <span class="stat-label">Tugas Terkirim</span>
            </div>
        </div>

        <div class="add-task">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Masukkan deskripsi tugas" required>
                <select id="subjectSelect" required>
                    <option value="">Pilih Mata Pelajaran</option>
                    <option value="matematika">🧮 Matematika</option>
                    <option value="biologi">🌱 Biologi</option>
                    <option value="kimia">⚗️ Kimia</option>
                    <option value="ekonomi">💰 Ekonomi</option>
                    <option value="sosiologi">👥 Sosiologi</option>
                    <option value="geografi">🌍 Geografi</option>
                    <option value="bahasa-indonesia">📖 Bahasa Indonesia</option>
                    <option value="bahasa-inggris">🇬🇧 Bahasa Inggris</option>
                    <option value="fisika">⚡ Fisika</option>
                    <option value="informatika">💻 Informatika</option>
                </select>
                <input type="date" id="dueDateInput">
                <label class="file-upload">
                    <span>📎 Upload File Tugas</span>
                    <span class="file-info" id="fileInfo">Belum ada file</span>
                    <input type="file" id="taskFile" accept=".pdf,.doc,.docx,.jpg,.png,.zip">
                </label>
                <button class="btn btn-primary" onclick="addTask()">➕ Tambah Tugas</button>
            </div>
        </div>

        <div class="subjects-grid" id="subjectsGrid"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || {};
        let currentFile = null;

        const subjects = [
            { id: 'matematika', name: 'Matematika', emoji: '🧮' },
            { id: 'biologi', name: 'Biologi', emoji: '🌱' },
            { id: 'kimia', name: 'Kimia', emoji: '⚗️' },
            { id: 'ekonomi', name: 'Ekonomi', emoji: '💰' },
            { id: 'sosiologi', name: 'Sosiologi', emoji: '👥' },
            { id: 'geografi', name: 'Geografi', emoji: '🌍' },
            { id: 'bahasa-indonesia', name: 'Bahasa Indonesia', emoji: '📖' },
            { id: 'bahasa-inggris', name: 'Bahasa Inggris', emoji: '🇬🇧' },
            { id: 'fisika', name: 'Fisika', emoji: '⚡' },
            { id: 'informatika', name: 'Informatika', emoji: '💻' }
        ];

        // File upload handler
        document.getElementById('taskFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                const fileInfo = document.getElementById('fileInfo');
                fileInfo.textContent = file.name.length > 20 ? file.name.substring(0, 20) + '...' : file.name;
                fileInfo.style.color = '#4facfe';
            }
        });

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const subjectSelect = document.getElementById('subjectSelect');
            const dueDateInput = document.getElementById('dueDateInput');

            const taskText = taskInput.value.trim();
            const subject = subjectSelect.value;
            const dueDate = dueDateInput.value;

            if (!taskText || !subject || !dueDate) {
                alert('Mohon lengkapi semua field!');
                return;
            }

            if (!tasks[subject]) {
                tasks[subject] = [];
            }

            const task = {
                text: taskText,
                date: dueDate,
                id: Date.now(),
                submitted: false,
                fileName: currentFile ? currentFile.name : null,
                fileSize: currentFile ? `${(currentFile.size / 1024).toFixed(1)} KB` : null
            };

            tasks[subject].push(task);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            
            // Reset form
            taskInput.value = '';
            subjectSelect.value = '';
            dueDateInput.value = '';
            document.getElementById('taskFile').value = '';
            document.getElementById('fileInfo').textContent = 'Belum ada file';
            document.getElementById('fileInfo').style.color = '#666';
            currentFile = null;
            
            renderSubjects();
            updateStats();
        }

        function submitTask(subject, taskId) {
            if (tasks[subject]) {
                const task = tasks[subject].find(t => t.id === taskId);
                if (task) {
                    task.submitted = true;
                    localStorage.setItem('tasks', JSON.stringify(tasks));
                    renderSubjects();
                    updateStats();
                    alert('✅ Tugas berhasil disubmit!');
                }
            }
        }

        function deleteTask(subject, taskId) {
            tasks[subject] = tasks[subject].filter(task => task.id !== taskId);
            if (tasks[subject].length === 0) {
                delete tasks[subject];
            }
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderSubjects();
            updateStats();
        }

        function renderSubjects() {
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = '';

            subjects.forEach(subject => {
                const subjectTasks = tasks[subject.id] || [];
                
                if (subjectTasks.length === 0) return;

                const submittedCount = subjectTasks.filter(t => t.submitted).length;
                const isFullySubmitted = submittedCount === subjectTasks.length;

                const subjectCard = document.createElement('div');
                subjectCard.className = `subject-card ${subject.id} ${isFullySubmitted ? 'submitted' : ''}`;
                
                subjectCard.innerHTML = `
                    <div class="subject-header">
                        <div class="subject-icon">${subject.emoji}</div>
                        <div class="subject-title">${subject.name}</div>
                        <div class="task-count">${subjectTasks.length}</div>
                        ${isFullySubmitted ? 
                            '<span class="status-badge status-submitted">LENGKAP ✓</span>' : 
                            `<span class="status-badge status-pending">${submittedCount}/${subjectTasks.length} Terkirim</span>`
                        }
                    </div>
                    <ul class="task-list">
                        ${subjectTasks.map(task => `
                            <li class="task-item ${task.submitted ? 'submitted' : ''}">
                                <div class="task-header">
                                    <div>
                                        <div class="task-text">${task.text}</div>
                                        <div class="task-date">📅 ${new Date(task.date).toLocaleDateString('id-ID')}</div>
                                    </div>
                                    <div style="display: flex; gap: 8px; align-items: center;">
                                        ${!task.submitted ? 
                                            `<button class="btn btn-success" onclick="submitTask('${subject.id}', ${task.id})" style="padding: 8px 16px; font-size: 14px;">Submit</button>` : 
                                            '<span class="status-badge status-submitted" style="font-size: 11px;">Terkirim ✓</span>'
                                        }
                                        <button class="btn btn-danger" onclick="deleteTask('${subject.id}', ${task.id})">×</button>
                                    </div>
                                </div>
                                ${task.fileName ? `
                                    <div class="file-preview">
                                        <div class="file-icon">📄</div>
                                        <span>${task.fileName}</span>
                                        <span style="color: #888;">(${task.fileSize})</span>
                                    </div>
                                ` : ''}
                            </li>
                        `).join('')}
                    </ul>
                `;
                
                grid.appendChild(subjectCard);
            });
        }

        function updateStats() {
            const totalTasks = Object.values(tasks).reduce((acc, subjectTasks) => acc + subjectTasks.length, 0);
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = Object.values(tasks).reduce((acc, subjectTasks) => {
                return acc + subjectTasks.filter(task => task.date === today).length;
            }, 0);
            const submittedTasks = Object.values(tasks).reduce((acc, subjectTasks) => {
                return acc + subjectTasks.filter(task => task.submitted).length;
            }, 0);

            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('todayTasks').textContent = todayTasks;
            document.getElementById('submittedTasks').textContent = submittedTasks;
        }

        // Keyboard shortcuts
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                addTask();
            }
        });

        // Set default date to tomorrow
        document.getElementById('dueDateInput').valueAsDate = new Date(new Date().getTime() + 24 * 60 * 60 * 1000);

        // Initialize
        init();

        function init() {
            renderSubjects();
            updateStats();
        }
    </script>
</body>
</html>
